services:
  - type: web
    name: sistema-elvis
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: elvis-db
          property: connectionString

databases:
  - name: elvis-db
    plan: free
